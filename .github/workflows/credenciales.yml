name: Gestión de Credenciales

on:
  workflow_dispatch:
    inputs:
      operacion:
        description: 'Operación a ejecutar'
        required: true
        type: choice
        options:
          - crear_actualizar
          - solo_actualizar
      client_name:
        description: 'Nombre del cliente'
        required: true
      tenant:
        description: 'Tenant'
        required: true
      tipo_credencial:
        description: 'Tipo de credencial'
        required: true
        type: choice
        options:
          - cc
          - ac
      client_id:
        description: 'Client ID existente (solo para solo_actualizar)'
        required: false
      scopes:
        description: 'Scopes'
        required: false
      redirect:
        description: 'Redirect URI (requerido para tipo ac)'
        required: false
      app_roles:
        description: 'App Roles a agregar (opcional, separados por coma)'
        required: false

concurrency:
  group: credencial-${{ github.event.inputs.client_name }}-${{ github.event.inputs.tenant }}
  cancel-in-progress: false

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/python-setup

      - name: Ejecutar tests
        run: pytest tests/ -v

  crear_sp:
    needs: tests
    if: ${{ inputs.operacion == 'crear_actualizar' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      client_id: ${{ steps.crear.outputs.client_id }}
      client_secret: ${{ steps.crear.outputs.client_secret }}
    steps:
      - uses: ./.github/actions/python-setup

      - name: Crear Service Principal
        id: crear
        env:
          CLIENT_NAME: ${{ inputs.client_name }}
          TENANT: ${{ inputs.tenant }}
        run: python scripts/service_principal/crear.py

      - name: Verificar propagación del SP
        uses: nick-fields/retry@v3
        env:
          CLIENT_ID: ${{ steps.crear.outputs.client_id }}
        with:
          timeout_seconds: 15
          max_attempts: 12
          retry_wait_seconds: 15
          command: python scripts/service_principal/verificar.py

  agregar_scopes:
    needs: [tests, crear_sp]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: ./.github/actions/python-setup

      - name: Agregar scopes al SP
        env:
          CLIENT_ID: ${{ inputs.operacion == 'crear_actualizar' && needs.crear_sp.outputs.client_id || inputs.client_id }}
          SCOPES: ${{ inputs.scopes }}
          TIPO_CREDENCIAL: ${{ inputs.tipo_credencial }}
        run: python scripts/configuracion/agregar_scopes.py

      - name: Verificar propagación de scopes
        uses: nick-fields/retry@v3
        env:
          CLIENT_ID: ${{ inputs.operacion == 'crear_actualizar' && needs.crear_sp.outputs.client_id || inputs.client_id }}
        with:
          timeout_seconds: 15
          max_attempts: 12
          retry_wait_seconds: 15
          command: python scripts/configuracion/verificar_scopes.py

  grant_admin:
    needs: [crear_sp, agregar_scopes]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: ./.github/actions/python-setup

      - name: Ejecutar Admin Consent
        env:
          CLIENT_ID: ${{ inputs.operacion == 'crear_actualizar' && needs.crear_sp.outputs.client_id || inputs.client_id }}
          TENANT: ${{ inputs.tenant }}
        run: python scripts/configuracion/grant_admin.py

      - name: Verificar propagación del Admin Consent
        uses: nick-fields/retry@v3
        env:
          CLIENT_ID: ${{ inputs.operacion == 'crear_actualizar' && needs.crear_sp.outputs.client_id || inputs.client_id }}
        with:
          timeout_seconds: 15
          max_attempts: 12
          retry_wait_seconds: 15
          command: python scripts/configuracion/verificar_grant.py

  app_roles:
    needs: [crear_sp, grant_admin]
    if: always() && !failure() && !cancelled() && inputs.app_roles != ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: ./.github/actions/python-setup

      - name: Agregar App Roles
        env:
          CLIENT_ID: ${{ inputs.operacion == 'crear_actualizar' && needs.crear_sp.outputs.client_id || inputs.client_id }}
          APP_ROLES: ${{ inputs.app_roles }}
        run: python scripts/configuracion/agregar_roles.py

      - name: Verificar propagación de App Roles
        uses: nick-fields/retry@v3
        env:
          CLIENT_ID: ${{ inputs.operacion == 'crear_actualizar' && needs.crear_sp.outputs.client_id || inputs.client_id }}
        with:
          timeout_seconds: 15
          max_attempts: 12
          retry_wait_seconds: 15
          command: python scripts/configuracion/verificar_roles.py

  keyvault:
    needs: [crear_sp, grant_admin, app_roles]
    if: always() && !failure() && !cancelled() && inputs.operacion == 'crear_actualizar'
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/python-setup

      - name: Guardar client_secret en KeyVault
        env:
          CLIENT_ID: ${{ needs.crear_sp.outputs.client_id }}
          CLIENT_SECRET: ${{ needs.crear_sp.outputs.client_secret }}
        run: python scripts/keyvault/guardar.py

  auditoria:
    needs: [crear_sp, grant_admin, app_roles]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/python-setup

      - name: Registrar en tabla de auditoría
        env:
          CLIENT_ID: ${{ inputs.operacion == 'crear_actualizar' && needs.crear_sp.outputs.client_id || inputs.client_id }}
          CLIENT_NAME: ${{ inputs.client_name }}
          TENANT: ${{ inputs.tenant }}
          TIPO_CREDENCIAL: ${{ inputs.tipo_credencial }}
          SCOPES: ${{ inputs.scopes }}
          REDIRECT: ${{ inputs.redirect }}
        run: python scripts/auditoria/registrar.py

  notificar_exito:
    needs: [keyvault, auditoria]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Flujo completado exitosamente
        run: |
          echo "Operación '${{ inputs.operacion }}' completada"
          echo "Cliente : ${{ inputs.client_name }}"
          echo "Tenant  : ${{ inputs.tenant }}"

  notificar_fallo:
    needs: [crear_sp, agregar_scopes, grant_admin, app_roles, keyvault, auditoria]
    if: always() && contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Reportar fallo del flujo
        run: |
          echo "El flujo falló para el cliente: ${{ inputs.client_name }}"
          echo "Operación  : ${{ inputs.operacion }}"
          echo "Tenant     : ${{ inputs.tenant }}"
          echo ""
          echo "Resultados por job:"
          echo "  crear_sp       : ${{ needs.crear_sp.result }}"
          echo "  agregar_scopes : ${{ needs.agregar_scopes.result }}"
          echo "  grant_admin    : ${{ needs.grant_admin.result }}"
          echo "  app_roles      : ${{ needs.app_roles.result }}"
          echo "  keyvault       : ${{ needs.keyvault.result }}"
          echo "  auditoria      : ${{ needs.auditoria.result }}"

